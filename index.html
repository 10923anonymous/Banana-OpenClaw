<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Room Designer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:800px;height:480px;overflow:hidden;font-family:Arial;background:#050508;color:#fff}
.container{width:800px;height:480px;display:flex;flex-direction:column}
.header{height:50px;background:linear-gradient(90deg,#0a0a1a,#1a0a2e);border-bottom:2px solid #00d4ff;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.header h1{font-size:16px;text-transform:uppercase;letter-spacing:2px;color:#00d4ff;text-shadow:0 0 10px #00d4ff}
.view-toggle{display:flex;gap:10px}
.view-btn{padding:8px 16px;border:1px solid #00d4ff;background:rgba(0,212,255,0.1);color:#00d4ff;cursor:pointer;font-size:10px;text-transform:uppercase}
.view-btn.active{background:#00d4ff;color:#000}
.main{flex:1;display:flex}
.room-display{width:500px;height:430px;background:#08080c}
.room-canvas{width:100%;height:100%}
.controls{width:300px;height:430px;background:#0a0a12;padding:12px;overflow-y:auto}
.control-section{margin-bottom:15px;padding:12px;background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.2);border-radius:4px}
.control-section h3{font-size:11px;margin-bottom:10px;color:#00d4ff;text-transform:uppercase;letter-spacing:1px}
.switch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.light-switch{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);border-radius:4px;padding:10px;text-align:center;cursor:pointer;font-size:9px}
.light-switch.on{background:rgba(0,212,255,0.3);border-color:#00d4ff;box-shadow:0 0 10px rgba(0,212,255,0.4)}
.switch-icon{font-size:18px;margin-bottom:4px}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.color-btn{width:45px;height:45px;border-radius:4px;border:2px solid rgba(255,255,255,0.1);cursor:pointer}
.color-btn.selected{border-color:#00d4ff;box-shadow:0 0 15px #00d4ff}
.furniture-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.furniture-btn{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);border-radius:4px;padding:8px;color:#88aacc;cursor:pointer;font-size:9px;text-transform:uppercase}
.furniture-btn.active{background:rgba(0,212,255,0.3);border-color:#00d4ff;color:#00d4ff}
.time-slider{margin-top:8px}
.time-slider input{width:100%;height:6px;background:linear-gradient(90deg,#1a1a3a,#00d4ff,#ff00ff,#1a1a3a)}
.time-label{text-align:center;margin-top:6px;font-size:11px;color:#00d4ff}
.action-btns{display:flex;gap:8px;margin-top:12px}
.action-btn{flex:1;padding:10px;border:none;border-radius:4px;background:#00d4ff;color:#000;cursor:pointer;font-size:10px;text-transform:uppercase;font-weight:bold}
.action-btn.secondary{background:transparent;border:1px solid #00d4ff;color:#00d4ff}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>NEON ROOM DESIGNER</h1>
<div class="view-toggle">
<button class="view-btn active" data-view="interior">Interior</button>
<button class="view-btn" data-view="exterior">Exterior</button>
</div>
</div>
<div class="main">
<div class="room-display">
<canvas id="roomCanvas" class="room-canvas"></canvas>
</div>
<div class="controls">
<div class="control-section">
<h3>Light Systems</h3>
<div class="switch-grid">
<div class="light-switch on" data-light="main"><div class="switch-icon">⚡</div><div>Neon Main</div></div>
<div class="light-switch on" data-light="accent"><div class="switch-icon">🔮</div><div>Hologram</div></div>
<div class="light-switch" data-light="floor"><div class="switch-icon">⬡</div><div>Floor Grid</div></div>
<div class="light-switch" data-light="ambient"><div class="switch-icon">✨</div><div>Ambient</div></div>
</div>
</div>
<div class="control-section">
<h3>Wall Matrix</h3>
<div class="color-grid" id="wallColors">
<div class="color-btn selected" style="background:#0a0a1a" data-color="#0a0a1a"></div>
<div class="color-btn" style="background:#1a0a2e" data-color="#1a0a2e"></div>
<div class="color-btn" style="background:#0a1a3e" data-color="#0a1a3e"></div>
<div class="color-btn" style="background:#1a1a2e" data-color="#1a1a2e"></div>
<div class="color-btn" style="background:#2d1a3e" data-color="#2d1a3e"></div>
<div class="color-btn" style="background:#1a3e2e" data-color="#1a3e2e"></div>
<div class="color-btn" style="background:#0d1a2e" data-color="#0d1a2e"></div>
<div class="color-btn" style="background:#1a1a1a" data-color="#1a1a1a"></div>
</div>
</div>
<div class="control-section">
<h3>Floor Grid</h3>
<div class="color-grid" id="floorColors">
<div class="color-btn selected" style="background:#0a0a15" data-color="#0a0a15"></div>
<div class="color-btn" style="background:#1a1a25" data-color="#1a1a25"></div>
<div class="color-btn" style="background:#0a1520" data-color="#0a1520"></div>
<div class="color-btn" style="background:#150a20" data-color="#150a20"></div>
<div class="color-btn" style="background:#0d0d1a" data-color="#0d0d1a"></div>
<div class="color-btn" style="background:#1a0d15" data-color="#1a0d15"></div>
<div class="color-btn" style="background:#0d1a15" data-color="#0d1a15"></div>
<div class="color-btn" style="background:#15151a" data-color="#15151a"></div>
</div>
</div>
<div class="control-section">
<h3>Tech Modules</h3>
<div class="furniture-grid">
<button class="furniture-btn active" data-furniture="hologram">Holo Desk</button>
<button class="furniture-btn active" data-furniture="robot">Robot</button>
<button class="furniture-btn" data-furniture="vacuum">Vacuum</button>
<button class="furniture-btn" data-furniture="screen">Screen</button>
<button class="furniture-btn" data-furniture="console">Console</button>
<button class="furniture-btn" data-furniture="drone">Drone</button>
</div>
</div>
<div class="control-section">
<h3>Time Cycle</h3>
<div class="time-slider">
<input type="range" id="timeSlider" min="0" max="24" value="20" step="0.5">
<div class="time-label" id="timeLabel">8:00 PM</div>
</div>
</div>
<div class="action-btns">
<button class="action-btn secondary" id="resetBtn">Reset</button>
<button class="action-btn" id="saveBtn">Save</button>
</div>
</div>
</div>
</div>
<script>
const canvas=document.getElementById('roomCanvas');
const ctx=canvas.getContext('2d');
canvas.width=500;canvas.height=430;
const state={view:'interior',lights:{main:true,accent:true,floor:false,ambient:false},wallColor:'#0a0a1a',floorColor:'#0a0a15',furniture:{hologram:true,robot:true,vacuum:false,screen:false,console:false,drone:false},time:20};
function drawInterior(){ctx.fillStyle='#08080c';ctx.fillRect(0,0,canvas.width,canvas.height);const tb=getTimeBrightness();const li=calcLight(tb);const wg=ctx.createLinearGradient(0,0,0,350);const wc=hexToRgb(state.wallColor);wg.addColorStop(0,`rgb(${wc.r*li},${wc.g*li},${wc.b*li})`);wg.addColorStop(1,`rgb(${wc.r*li*0.5},${wc.g*li*0.5},${wc.b*li*0.5})`);ctx.fillStyle=wg;ctx.fillRect(50,50,400,300);const fg=ctx.createLinearGradient(0,350,0,430);const fc=hexToRgb(state.floorColor);fg.addColorStop(0,`rgb(${fc.r*li},${fc.g*li},${fc.b*li})`);fg.addColorStop(1,`rgb(${fc.r*li*0.4},${fc.g*li*0.4},${fc.b*li*0.4})`);ctx.fillStyle=fg;ctx.fillRect(50,350,400,80);if(state.lights.floor){ctx.strokeStyle=`rgba(0,212,255,${0.3*li})`;ctx.lineWidth=1;for(let i=0;i<10;i++){ctx.beginPath();ctx.moveTo(50+i*40,350);ctx.lineTo(30+i*38,430);ctx.stroke();}for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(50,350+i*13);ctx.lineTo(450,350+i*13);ctx.stroke();}}drawWindow(120,70,180,100,tb);drawDoor(380,150,60,200);if(state.furniture.hologram)drawHoloDesk(80,220,li);if(state.furniture.robot)drawRobot(300,200,li);if(state.furniture.vacuum)drawVacuum(150,360,li);if(state.furniture.screen)drawScreen(400,80,li);if(state.furniture.console)drawConsole(60,320,li);if(state.furniture.drone)drawDrone(200,100,li);drawLightEffects(li);}
function drawExterior(){ctx.fillStyle='#08080c';ctx.fillRect(0,0,canvas.width,canvas.height);const tb=getTimeBrightness();const sg=ctx.createLinearGradient(0,0,0,300);if(state.time>=6&&state.time<18){sg.addColorStop(0,'#1a3a5a');sg.addColorStop(1,'#2a5a8a');}else if(state.time>=18&&state.time<20){sg.addColorStop(0,'#2a1a4a');sg.addColorStop(0.5,'#4a2a6a');sg.addColorStop(1,'#1a3a5a');}else{sg.addColorStop(0,'#0a0a1a');sg.addColorStop(1,'#1a0a2e');}ctx.fillStyle=sg;ctx.fillRect(0,0,canvas.width,300);if(state.time>=6&&state.time<18){ctx.fillStyle='#00d4ff';ctx.beginPath();ctx.arc(420,60,25,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(0,212,255,0.3)';ctx.beginPath();ctx.arc(420,60,40,0,Math.PI*2);ctx.fill();}else{ctx.fillStyle='#c0c0d0';ctx.beginPath();ctx.arc(420,60,20,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(415,55,15,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#0a1520';ctx.fillRect(0,300,canvas.width,130);drawFuturisticHouse(150,180,200,150,tb);drawNeonTree(50,250,tb);drawNeonTree(420,230,tb);ctx.fillStyle='rgba(0,212,255,0.2)';ctx.beginPath();ctx.moveTo(220,330);ctx.lineTo(280,330);ctx.lineTo(300,430);ctx.lineTo(200,430);ctx.closePath();ctx.fill();}
function drawWindow(x,y,w,h,tb){ctx.fillStyle='#1a1a2a';ctx.fillRect(x-5,y-5,w+10,h+10);const gg=ctx.createLinearGradient(x,y,x,y+h);if(state.time>=6&&state.time<18){gg.addColorStop(0,`rgba(0,150,200,${0.2+tb*0.3})`);gg.addColorStop(1,`rgba(0,100,150,${0.2+tb*0.3})`);}else{gg.addColorStop(0,`rgba(0,50,80,${0.3+tb*0.2})`);gg.addColorStop(1,`rgba(0,30,50,${0.3+tb*0.2})`);}ctx.fillStyle=gg;ctx.fillRect(x,y,w,h);ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);ctx.beginPath();ctx.moveTo(x+w/2,y);ctx.lineTo(x+w/2,y+h);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y+h/2);ctx.lineTo(x+w,y+h/2);ctx.stroke();ctx.strokeStyle='rgba(0,212,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+10,y+h-10);ctx.lineTo(x+w/2-10,y+h/2+10);ctx.stroke();}
function drawDoor(x,y,w,h){ctx.fillStyle='#1a1a2a';ctx.fillRect(x-3,y-3,w+6,h+6);const dg=ctx.createLinearGradient(x,y,x+w,y+h);dg.addColorStop(0,'#2a2a3a');dg.addColorStop(1,'#1a1a2a');ctx.fillStyle=dg;ctx.fillRect(x,y,w,h);ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);ctx.fillStyle='#00d4ff';ctx.beginPath();ctx.arc(x+w-12,y+h/2,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,212,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+10,y+10);ctx.lineTo(x+w-10,y+10);ctx.moveTo(x+10,y+h-10);ctx.lineTo(x+w-10,y+h-10);ctx.stroke();}
function drawHoloDesk(x,y,li){ctx.fillStyle=`rgba(0,100,150,${0.5*li})`;ctx.fillRect(x,y,100,10);ctx.fillStyle=`rgba(0,150,200,${0.3*li})`;ctx.fillRect(x+5,y+10,8,60);ctx.fillRect(x+87,y+10,8,60);ctx.fillStyle=`rgba(0,212,255,${0.6*li})`;ctx.fillRect(x+30,y-40,40,40);ctx.strokeStyle='#00d4ff';ctx.lineWidth=1;ctx.strokeRect(x+30,y-40,40,40);ctx.fillStyle=`rgba(255,0,255,${0.4*li})`;ctx.beginPath();ctx.moveTo(x+35,y-35);ctx.lineTo(x+65,y-35);ctx.lineTo(x+50,y-20);ctx.closePath();ctx.fill();if(state.lights.accent){ctx.fillStyle='rgba(0,212,255,0.2)';ctx.beginPath();ctx.arc(x+50,y-20,50,0,Math.PI*2);ctx.fill();}}
function drawRobot(x,y,li){ctx.fillStyle=`rgba(180,180,190,${0.8*li})`;ctx.fillRect(x+20,y,30,60);ctx.fillStyle=`rgba(160,160,170,${0.9*li})`;ctx.beginPath();ctx.arc(x+35,y-15,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff0040';ctx.beginPath();ctx.arc(x+35,y-15,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,0,64,0.5)';ctx.beginPath();ctx.arc(x+35,y-15,12,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(200,50,50,${0.6*li})`;ctx.fillRect(x+25,y+15,8,20);ctx.fillRect(x+40,y+15,8,20);ctx.fillStyle=`rgba(120,120,130,${0.7*li})`;ctx.fillRect(x+5,y+20,15,30);ctx.fillRect(x+55,y+20,15,30);if(state.lights.accent){ctx.fillStyle='rgba(255,0,64,0.3)';ctx.beginPath();ctx.arc(x+35,y+30,40,0,Math.PI*2);ctx.fill();}}
function drawVacuum(x,y,li){ctx.fillStyle=`rgba(60,60,70,${0.8*li})`;ctx.beginPath();ctx.arc(x+20,y+15,18,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(0,212,255,${0.6*li})`;ctx.beginPath();ctx.arc(x+20,y+10,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(0,212,255,${0.4*li})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(x+20,y+15,15,0,Math.PI*2);ctx.stroke();}
function drawScreen(x,y,li){ctx.fillStyle=`rgba(10,10,20,${0.9*li})`;ctx.fillRect(x,y,60,40);ctx.fillStyle=`rgba(0,212,255,${0.4*li})`;ctx.fillRect(x+5,y+5,50,30);ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.strokeRect(x,y,60,40);ctx.fillStyle='#00d4ff';ctx.font='8px Arial';ctx.fillText('SYSTEM',x+15,y+20);ctx.fillText('ONLINE',x+18,y+30);}
function drawConsole(x,y,li){ctx.fillStyle=`rgba(40,40,50,${0.8*li})`;ctx.fillRect(x,y,40,25);ctx.fillStyle=`rgba(0,212,255,${0.5*li})`;for(let i=0;i<3;i++)for(let j=0;j<4;j++)ctx.fillRect(x+5+j*8,y+5+i*5,4,3);}
function drawDrone(x,y,li){ctx.fillStyle=`rgba(80,80,90,${0.7*li})`;ctx.fillRect(x,y,30,8);ctx.fillStyle=`rgba(0,212,255,${0.8*li})`;ctx.beginPath();ctx.arc(x+15,y+4,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(0,212,255,0.3)';ctx.beginPath();ctx.arc(x+15,y+4,15,0,Math.PI*2);ctx.fill();}
function drawFuturisticHouse(x,y,w,h,tb){const hc=hexToRgb(state.wallColor);ctx.fillStyle=`rgb(${hc.r*tb},${hc.g*tb},${hc.b*tb})`;ctx.fillRect(x,y,w,h);ctx.fillStyle='#1a1a2a';ctx.beginPath();ctx.moveTo(x-20,y);ctx.lineTo(x+w/2,y-50);ctx.lineTo(x+w+20,y);ctx.closePath();ctx.fill();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-20,y);ctx.lineTo(x+w/2,y-50);ctx.lineTo(x+w+20,y);ctx.stroke();ctx.fillStyle='#0a0a15';ctx.fillRect(x+w/2-25,y+h-60,50,60);ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.strokeRect(x+w/2-25,y+h-60,50,60);ctx.fillStyle='#00d4ff';ctx.beginPath();ctx.arc(x+w/2+15,y+h-30,3,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(0,100,150,${0.3+tb*0.3})`;ctx.fillRect(x+30,y+40,50,40);ctx.fillRect(x+w-80,y+40,50,40);ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.strokeRect(x+30,y+40,50,40);ctx.strokeRect(x+w-80,y+40,50,40);if(state.lights.main||state.lights.accent){ctx.fillStyle='rgba(0,212,255,0.3)';ctx.beginPath();ctx.arc(x+w/2,y+100,60,0,Math.PI*2);ctx.fill();}}
function drawNeonTree(x,y,tb){ctx.fillStyle=`rgba(40,40,50,${0.8*tb})`;ctx.fillRect(x-8,y,16,50);ctx.fillStyle=`rgba(0,212,255,${0.4*tb})`;ctx.beginPath();ctx.arc(x,y-20,35,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(0,212,255,${0.6*tb})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y-20,35,0,Math.PI*2);ctx.stroke();ctx.fillStyle=`rgba(255,0,255,${0.3*tb})`;ctx.beginPath();ctx.arc(x-15,y-10,15,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+15,y-30,12,0,Math.PI*2);ctx.fill();}
function drawLightEffects(li){if(state.lights.main){ctx.fillStyle='rgba(0,212,255,0.15)';ctx.beginPath();ctx.arc(250,100,120,0,Math.PI*2);ctx.fill();}if(state.lights.accent){ctx.fillStyle='rgba(255,0,255,0.1)';ctx.beginPath();ctx.arc(130,220,80,0,Math.PI*2);ctx.fill();}if(state.lights.ambient){ctx.fillStyle='rgba(0,212,255,0.08)';ctx.fillRect(50,50,400,300);}}
function getTimeBrightness(){if(state.time>=6&&state.time<18){const md=12;const dfm=Math.abs(state.time-md);return 0.5+(1-dfm/6)*0.4;}else if(state.time>=18&&state.time<20){return 0.4-(state.time-18)*0.15;}else{return 0.2;}}
function calcLight(nb){let al=0;if(state.lights.main)al+=0.4;if(state.lights.accent)al+=0.25;if(state.lights.floor)al+=0.15;if(state.lights.ambient)al+=0.1;return Math.min(1,nb+al);}
function hexToRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:10,g:10,b:26};}
function formatTime(t){const h=Math.floor(t);const m=(t%1)*60;const ap=h>=12?'PM':'AM';const dh=h%12||12;const dm=m===0?'00':'30';return dh+':'+dm+ap;}
function draw(){state.view==='interior'?drawInterior():drawExterior();}
document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.view=b.dataset.view;draw();}));
document.querySelectorAll('.light-switch').forEach(s=>s.addEventListener('click',()=>{const l=s.dataset.light;state.lights[l]=!state.lights[l];s.classList.toggle('on',state.lights[l]);draw();}));
document.querySelectorAll('#wallColors .color-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#wallColors .color-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');state.wallColor=b.dataset.color;draw();}));
document.querySelectorAll('#floorColors .color-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#floorColors .color-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');state.floorColor=b.dataset.color;draw();}));
document.querySelectorAll('.furniture-btn').forEach(b=>b.addEventListener('click',()=>{const f=b.dataset.furniture;state.furniture[f]=!state.furniture[f];b.classList.toggle('active',state.furniture[f]);draw();}));
const ts=document.getElementById('timeSlider');const tl=document.getElementById('timeLabel');
ts.addEventListener('input',()=>{state.time=parseFloat(ts.value);tl.textContent=formatTime(state.time);draw();});
document.getElementById('resetBtn').addEventListener('click',()=>{state.wallColor='#0a0a1a';state.floorColor='#0a0a15';state.lights={main:true,accent:true,floor:false,ambient:false};state.furniture={hologram:true,robot:true,vacuum:false,screen:false,console:false,drone:false};state.time=20;document.querySelectorAll('.light-switch').forEach(s=>s.classList.remove('on'));document.querySelector('[data-light="main"]').classList.add('on');document.querySelector('[data-light="accent"]').classList.add('on');document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('selected'));document.querySelector('#wallColors .color-btn').classList.add('selected');document.querySelector('#floorColors .color-btn').classList.add('selected');document.querySelectorAll('.furniture-btn').forEach(b=>b.classList.toggle('active',state.furniture[b.dataset.furniture]));ts.value=20;tl.textContent='8:00 PM';draw();});
document.getElementById('saveBtn').addEventListener('click',()=>{const d=JSON.stringify(state,null,2);const b=new Blob([d],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='neon-room.json';a.click();URL.revokeObjectURL(u);const btn=document.getElementById('saveBtn');btn.textContent='Saved!';setTimeout(()=>btn.textContent='Save',1500);});
draw();
</script>
</body>
</html>
